topic: "AI 辅助选股助手（A 股 + 港股，Socratic 引导 + Top-down 候选池）"
slug: "ai-stock-picker-hkcn"

goal: >
  系统梳理「用 AI skill 帮我选股」这套方案在 A 股 + 港股市场的完整方法论与技术栈。
  产出一份「新手可懂 + 能与 skill 对话」的知识图谱：
  (1) 选股应该关注哪些方面（价值/成长/质量/红利/动量等流派 × 12 维度体系）；
  (2) Top-down 流程：宏观周期 → 行业轮动判断 → 行业内个股排序 → 风险否决；
  (3) A 股 vs 港股市场特色因子对比（北向/南下/龙虎榜/老千股/T+0 等）；
  (4) 「持有周期 × 维度权重」矩阵（长线 / 中线 / 波段三周期并行）；
  (5) Socratic 引导问卷如何设计（robo-advisor KYC + 行为金融偏好挖掘），
      能把用户自然语言需求（"最值得关注的行业" / "行业 X 里最值得买的几只"）
      收敛到具体筛选规则；
  (6) 数据实现地图：每个维度在 AkShare/Tushare/Qlib Alpha158 上的取数路径；
  (7) 候选池输出格式（分层池 vs 打分卡 vs 研报式）与新手友好的解释性设计；
  (8) 避坑清单与硬性否决项（价值陷阱 / 港股老千 / A 股面值退 / 商誉 / 股权质押）。

  最终目标：读者能与 skill 用自然语言对话（"现在半导体行业值得进吗"、
  "消费行业里给我推 5 只长线股"），理解 skill 给出的每一条推荐的理由，
  并能在需要时与 skill 讨论调整偏好。

audience: >
  新手友好 + 能与 skill 对话（audience 层级 a→b 之间）。
  假设读者：
    - 懂基础股票概念（K 线、PE、成交量），但不懂多因子模型
    - 不写回测代码，但能读懂 skill 给出的评分表和研报
    - 主要通过自然语言与 skill 交互，不手动调权重
    - 看 wiki 是为了理解 skill 的推荐理由、判断某个建议是否靠谱
  不需要：
    - 手写因子公式、矩阵运算、回测代码
    - 机构级量化术语（IC/IR/Alpha 衰减等）除非必要
  需要讲清楚：
    - 每个维度/指标背后的直觉（"为什么 ROE 比净利率更重要"）
    - 每个流派的适用场景（"什么时候该看红利股"）
    - A/HK 特色因子为什么不能套美股套路
    - 选股中的陷阱与反直觉结论

key_questions:
  - id: 1
    text: "选股方法论总览：价值/成长/质量/红利/动量五派 × Top-down vs Bottom-up"
    detail: >
      为新手建立「流派地图」：每一派看什么指标、背后的投资直觉、
      代表人物与代表书、适合什么市场环境与持有周期。
      Top-down（宏观→行业→个股）vs Bottom-up（个股→组合）的区别与互补。
      本项目因用户查询模式（"最值得关注的行业"、"行业 X 里 Top-N"）
      主推 Top-down，但要说明何时需要 Bottom-up 补充。
      产出：一张「流派 × 关注指标 × 适用场景 × 持有周期 × 经典书/人物」总表
      + 对中级新手的选派建议树。

  - id: 2
    text: "★ 行业选择：怎么判断「当前最值得关注的行业」"
    detail: >
      本研究新颖度最高的问题。用户典型查询之一就是
      "当前最值得关注的行业是什么"，需要把它拆成可操作的信号组合：
      - 行业景气度：PMI、产能利用率、库存周期、工业企业利润、订单数据
      - 行业估值分位：PE/PB 在历史 3/5/10 年百分位、中信/申万/恒生行业分类
      - 资金面：北向持股行业分布变化、南下资金流向、
        公募/社保/QFII 持仓变化、行业 ETF 净申购、融资融券余额
      - 经济周期定位：美林投资时钟（复苏/过热/滞胀/衰退）与行业对应
      - 政策/主题催化：中央经济工作会议、专项规划、同花顺/WIND 概念热度
      - 相对强度：行业指数 vs 大盘 20 日/60 日相对收益
      - 分析师一致预期：盈利上调比例、评级上调家数
      产出：
      (1) 「行业景气判断」多信号综合打分框架（每信号权重 + 可得性）；
      (2) 不同市场环境下（牛市/熊市/震荡）该重点看哪些信号；
      (3) A 股 vs 港股的行业分类体系差异（中信/申万 vs 恒生行业）；
      (4) 一个端到端例子：从 2026 年当下宏观环境推出 3-5 个候选行业。

  - id: 3
    text: "个股 12 维度体系（what / why / how / trade-off / 数据源）"
    detail: >
      为新手讲清楚每个维度「为什么要看、怎么看、有什么陷阱」。
      逐维展开：
        1) 估值：PE/PB/PEG/PS/EV-EBITDA/股息率 + 行业相对估值 + 历史分位
        2) 成长：营收/净利/扣非净利 YoY & QoQ、未来 3 年一致预期增速
        3) 质量：ROE/ROIC、毛利率、净利率、经营现金流/净利润比
        4) 护城河：市占率、品牌溢价、切换成本、规模效应、网络效应
        5) 动量/趋势：20/60/120 日均线、相对强度 RS、52 周高点距离
        6) 技术形态：突破/回踩/背离/箱体；对新手该讲多简洁？
        7) 量价：换手率、量比、放量突破、MACD
        8) 资金流：大单净流入、主力资金、北向/南下增减持、陆股通
        9) 分红：股息率、分红连续性、派息率、股息增长率
       10) 治理：大股东质押率、高管增减持、商誉占净资产比、诉讼
       11) 风险：ST/*ST 状态、退市风险、财务舞弊信号（贝尼什 M-score）
       12) 催化剂：业绩预告、业绩超预期、事件驱动（定增、重组、解禁、
           回购、新产品）
      每维度：一句话定义 + 为什么重要 + 入门看哪 2-3 个指标 +
              陷阱 + 在 AkShare/Tushare 里怎么取。
      产出：12 维卡片 + 「持有周期 × 维度权重」3 列矩阵（长/中/波段）。

  - id: 4
    text: "★ A 股 vs 港股：市场特色因子与避坑点对比"
    detail: >
      为什么不能把美股的套路直接搬到 A/HK？两个市场各自独有的东西：
      A 股特色：
        - 北向资金（陆股通）持股变化与「聪明钱」效应
        - 龙虎榜（游资/机构席位）、大宗交易折价
        - 涨跌停板（±10% / ST ±5% / 创业板科创板 ±20%）
        - ST / *ST / 退市整理板制度
        - 注册制（科创板 / 创业板 / 北交所）与主板的差异
        - 融资融券余额变化（融资买入额 / 融券余量）
        - 限售股解禁压力
        - 新股首日不设涨跌幅但个别板块有特殊规则
      港股特色：
        - 南下资金（港股通）偏好与定价权变迁
        - 老千股识别（频繁供股 / 大比例合股拆股 / 盘子小 / 股价低）
        - T+0 与无涨跌幅限制
        - 做空机制（可空 + 借券费率）
        - 同股不同权（W 股）、存托凭证（ADR）
        - 港股通可买清单的限制、人民币计价通道
        - 红筹/国企指数/恒生科技成分股差异
        - 仙股（<1 HKD）流动性枯竭
      交叉：AH 折溢价套利逻辑、AH 两地上市切换
      产出：
      (1) A+HK 特色因子双栏对比卡；
      (2) 老千股 8 项识别清单；
      (3) A 股地雷 10 项（面值退 / 股权质押 / 商誉 / ST / 立案调查等）；
      (4) 为什么不建议把美股动量因子 / Fama-French 3F 直接套中国市场。

  - id: 5
    text: "数据实现地图：12 维度 × A/HK × AkShare/Tushare/Qlib 取数路径"
    detail: >
      延续 ID 26 (stock-data-sources-cn-hk.md)：针对选股需要的每个维度，
      列出具体的数据接口与字段。
      内容：
      - 基本面：AkShare 的 stock_financial_*、Tushare 的 fina_indicator、
        港股用 Futu/Longbridge 还是 AkShare 的东财接口
      - 资金流：北向 stock_hsgt_*、龙虎榜 stock_lhb_*、
        南下 stock_hk_ggt_components、主力资金 stock_individual_fund_flow
      - 行业分类：中信 stock_board_industry_name_ths、申万、恒生
      - 一致预期：Tushare report_rc、东财研报
      - 景气：宏观 macro_china_pmi、库存周期
      - Qlib Alpha158 / Alpha360 因子库有哪些可以直接用于选股
        （vs 择时因子区别）、如何把港股数据 CSV→bin 接入 Qlib
      产出：
      (1) 12 维 × A/HK × 接口 × 字段 × 调用示例 矩阵；
      (2) 数据源主推组合（AkShare+Tushare Pro 基础版 + Futu 港股行情）；
      (3) 取数限流/缓存策略（哪些可本地缓存、哪些需实时）。

  - id: 6
    text: "★ Socratic 引导问卷怎么设计（stock-profile.yaml 字段）"
    detail: >
      skill 的核心交互形态是 Socratic 引导。问卷设计参考：
      - 传统 robo-advisor KYC（风险承受、流动性需求、投资期限）
      - 行为金融偏好问卷（损失厌恶、过度自信、锚定效应自查）
      - 晨星投资风格箱（价值-平衡-成长 × 大-中-小盘）
      - 财商测试（对回撤、浮亏、仓位的具体感受）
      最少需要多少问题能产出可用的 stock-profile？
      哪些问题是必问（周期偏好、能否接受 30% 回撤、单票最大仓位）？
      哪些是可选（偏好行业、规避行业、宗教/ESG 约束）？
      如何用自然语言示例让新手能答（而不是让他们选"低/中/高"）？
      如何在使用中迭代 profile（skill 记录用户拒绝/喜欢的推荐，
      反向推断真实偏好 → 行为校准）？
      产出：
      (1) stock-profile.yaml 完整字段设计（必填 / 可选 / 衍生）；
      (2) 问卷版本（Cold Start 完整版 20 题 + 日常 5 题精简版）；
      (3) 行为校准机制：从用户反馈（"这只我不会买，因为 X"）
          自动更新 profile 的 mapping 表。

  - id: 7
    text: "候选池输出格式：分层池 vs 打分卡 vs 研报式（新手友好性）"
    detail: >
      skill 每次输出长什么样？几种可能：
      - 分层池：核心（Top 3-5）/ 观察（Top 6-15）/ 储备（Top 16-30）
      - 打分卡：每只票展示 12 维度得分 + 总分 + 亮点/风险
      - 研报式：每只票 300-500 字段落，含选股理由、风险点、催化剂
      - 决策树式：「为什么这只票进了池」的可展开推理链
      新手最需要的是「解释性」：每一条推荐必须给出「我为什么推它」，
      并且允许用户一句话反驳后重选（"我不喜欢白酒" → 下次自动排除）。
      输出要不要包含目标价？止损位？（会不会让新手误以为是投资建议？）
      合规提示怎么自然融入（必须说明仅供学习、非投资建议）？
      产出：
      (1) 三种输出格式对比 + 推荐主打格式；
      (2) 一份示例输出（针对"消费行业给我推 5 只长线股"的回答 skeleton）；
      (3) 新手防坑文案模板（合规、风险提示、情绪管理）。

  - id: 8
    text: "避坑清单与硬性否决项（在打分之前就筛掉的地雷）"
    detail: >
      打分再高的股票，只要踩到这些硬否决项之一，就直接剔除候选池：
      A 股否决项：
        - ST / *ST / 退市风险警示
        - 最近 12 个月被证监会立案调查
        - 连续两年扣非亏损且主业萎缩
        - 商誉 / 净资产比 > 50%
        - 大股东质押率 > 70%
        - 频繁重组失败 / 定增失败
        - 营收与净利方向相反超过 2 年
        - 现金流与净利润持续背离（利润虚增信号）
      港股否决项：
        - 连续 3 年无实际业务 / 只有投资收益
        - 12 个月内有大比例供股、合股、拆股
        - 股价长期低于 1 HKD（仙股）
        - 盘子过小（市值 < 5 亿 HKD）
        - 做空比例异常升高（Activist short 目标）
        - 审计师出具非标意见
      跨市场共性陷阱：
        - 价值陷阱：静态 PE 低但 ROE 持续下滑
        - 动量陷阱：强势股 RSI > 90 同时缩量滞涨
        - 小市值流动性陷阱：日均成交 < 组合单票市值的 5%
        - 强周期错配：周期股高点低 PE / 低点高 PE 的反向解读
      产出：
      (1) A+HK 硬否决规则表；
      (2) 软警告规则表（不剔除但打分扣分）；
      (3) 每条规则的数据字段 + 阈值 + 在 AkShare/Tushare 里怎么判。

scope_boundary: >
  ✅ 范围内：
    - A 股 + 港股双市场
    - 长/中/波段三周期并行（权重不同）
    - 新手可懂 + 能与 skill 对话的深度
    - Socratic 引导作为主交互形态
    - Top-down（宏观→行业→个股）为主流程
    - 12 维度体系（基本面 / 技术面 / 资金面 / 风险面齐全）
    - A/HK 特色因子（北向/南下/龙虎榜/老千股 等）
    - 数据接口落地（AkShare / Tushare / Qlib Alpha158 / Futu）

  ❌ 范围外：
    - 择时（买卖时点）：属于 ai-swing-reminder-hkcn 项目
    - 组合构建与再平衡（Markowitz / Risk Parity / Black-Litterman）
    - 仓位管理与止损止盈策略
    - 美股 / 期货 / 期权 / 加密货币 / 外汇
    - 机构级因子研究（IC / IR / Fama-French / Barra）—
      除非用来解释新手关心的概念
    - 手写回测框架、多因子模型训练代码
    - 程序化交易合规（属上一个项目）
    - OpenClaw 部署细节（属上一个项目）

