mode: "new"

notes: >
  - 本项目与 ai-swing-reminder-hkcn 互不关心，但共享 raw/ 数据源笔记。
  - 用户背景：新手 + 不懂量化 + 偏好自然语言交互。
  - 用户典型查询：
      "当前最值得关注的行业是什么" → KQ2 直接对应
      "行业 X 里最值得买的几只" → KQ2+KQ3+KQ7 综合
      "这只票值不值得进" → KQ3+KQ8
  - 研究核心创新点（上一个项目未覆盖）：
      KQ2 行业选择 + KQ4 A/HK 特色因子 + KQ6 Socratic 问卷设计
  - 输出风格：每个关键概念要配「直觉解释」+「代表例子」+「反例/陷阱」
      三段式，避免纯术语堆砌。
