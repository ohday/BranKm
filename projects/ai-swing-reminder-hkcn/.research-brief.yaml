topic: "AI 辅助波段交易助手（A 股 + 港股，纯提醒 + 港股下单，OpenClaw 部署）"
slug: "ai-swing-reminder-hkcn"
goal: >
  系统梳理「用 AI 帮我设计波段策略 + 阈值触发时推送提醒」这套方案在 A 股 + 港股
  市场上的完整技术栈与方法论。产出一份中级量化水平可直接参照落地的知识图谱：
  (1) 数据/回测/策略生成/信号分发/部署五层各自的开源选型与取舍；
  (2) 「AI 帮构建策略」四条主流路线（LLM 规则生成 / 强化学习 / 多 Agent 研究员 /
      LLM 因子挖掘）的机制、代表作、适用场景对比；
  (3) OpenClaw 作为 7×24 承载层的 skill 化落地模式；
  (4) A 股合规红线（只能提醒）与港股合法下单 API（Futu / Longbridge / Tiger）
      的现状与工作流；
  (5) 从自然语言策略偏好 → 代码 → 回测 → 上线提醒 的端到端闭环实操模板与参考仓库清单。

audience: >
  中级量化水平（(b)）：懂基础回测与 Python，熟悉 pandas/因子/夏普等概念，
  会读懂策略代码但未必手写过完整回测框架。目标是能看完 wiki 后：
    - 做出「用哪套数据 / 哪个回测框架 / 哪条 AI 路线」的架构决策
    - 评估开源仓库是否适合 fork 二次开发
    - 把自己的策略偏好翻译成 Claude prompt + 回测代码 + OpenClaw skill
  不需要从零讲「什么是 MA」这类入门内容；需要讲清楚每个技术选型背后的 trade-off。
  使用场景：波段（持仓数日到数周）、日频数据为主、纯提醒（A 股）+ 可选港股下单。

key_questions:
  - id: 1
    text: "A 股 + 港股日频数据的开源/低价 API 全景对比"
    detail: >
      Tushare Pro / AkShare / baostock / yfinance / Futu OpenAPI (富途) /
      Longbridge OpenAPI (长桥) / Tiger OpenAPI / Wind 个人版。
      比较维度：免费额度、字段覆盖（行情/基本面/资金流/北向/新闻/研报）、
      复权处理、频率上限、稳定性、Python SDK 成熟度、A+HK 双市场覆盖度。
      产出：一张「按用途选源」的决策表 + 主推组合（如 AkShare+Futu）。

  - id: 2
    text: "回测框架选型：Qlib / Backtrader / vn.py / Zipline-cn / bt"
    detail: >
      波段场景 + Python AI 生态对接 + 中文社区 + A/HK 双市场 的综合取舍。
      Qlib 的 Alpha158/Alpha360 因子库与 workflow 是否值得作为主干？
      Backtrader 的灵活性是否更适合规则派波段？
      vn.py 是否过重（偏实盘/期货）？
      给中级用户的推荐路径（单用 vs 组合使用）。

  - id: 3
    text: "★ AI 帮构建策略：四条主流路线的机制与对比（本研究核心）"
    detail: >
      路线 A - LLM 对话式生成规则/因子代码：
        Claude/GPT 作为 pair-quant；prompt 模板；把自然语言偏好翻译为
        因子表达式/择时规则；代码 → 回测 → 参数优化的人机协作闭环。
      路线 B - 强化学习（FinRL / Qlib-RL）：
        状态/动作/奖励设计；DDPG/PPO 在 A 股的适用性与过拟合风险；
        代表论文、FinRL 工作流、训练成本。
      路线 C - Multi-Agent LLM 研究员（TradingAgents / FinMem / FinAgent）：
        分析师-研究员-交易员-风控多角色辩论；记忆/反思机制；
        论文出处、代码仓库、A 股适配情况。
      路线 D - LLM 因子挖掘（Alpha-GPT / QuantAgent / FinGPT）：
        把 LLM 当"因子生成器"而非"交易员"；遗传式 + LLM 的 alpha 搜索；
        与 Qlib Alpha158 的关系。
      产出：四路线 × (工作流 / 数据需求 / 算力 / 过拟合风险 / 适合用户)
      的比较矩阵 + 对「中级 + 波段 + 中文市场 + 纯提醒」场景的路线推荐。

  - id: 4
    text: "开源仓库深度清单（过滤：波段 + A/HK 友好 + 中级可上手）"
    detail: >
      逐个评估以下仓库并打分：
      Qlib、FinRL、FinRL-Meta、FinGPT、TradingAgents（清华/港科）、
      FinMem、FinAgent、AI-Hedge-Fund (virattt)、ai-hedge-fund、
      awesome-quant / awesome-quant-cn、Alpha158/360、QuantAgent、
      stockbot-on-groq、OpenBB、Qbot、vn.py、easyquotation、easytrader、
      akshare 示例库、tushare 示例库。
      评估维度：star 数、最近更新、A/HK 覆盖、文档质量、上手难度、
      与本研究目标的匹配度。
      产出：Tier-1（必 fork）/ Tier-2（可选参考）/ Tier-3（知道就好）清单。

  - id: 5
    text: "策略 → 信号 → 提醒：工程架构与推送渠道"
    detail: >
      定时轮询 vs 事件驱动（WebSocket/行情推送）的取舍；
      信号去重（同一信号一天触发一次）/ 防抖（冷却期）/
      多源确认（多因子一致）/ 分级提醒（强/弱信号）的工程模式。
      推送渠道对比：Telegram Bot / 企业微信群机器人 / Server 酱 /
      PushPlus / Bark (iOS) / 钉钉 / Discord / Slack /
      邮件 SMTP / 短信网关。
      产出：一张按「国内 IM / 海外 IM / 移动推送 / 邮件」分类的渠道矩阵
      + 一份生产级信号分发代码骨架。

  - id: 6
    text: "OpenClaw 承载：skill 化落地模式"
    detail: >
      OpenClaw 的 skill 机制（文档 / ClawHub）；
      把「每日盘后跑回测 + 触发提醒」包装成 skill 的模板；
      数据持久化选型（SQLite / Parquet / DuckDB / Postgres）在个人 VPS 上的权衡；
      策略状态/触发日志/回测结果的存储与查询方式；
      VPS 选型：大陆访问 A 股 API 需要大陆 IP（阿里云/腾讯云/华为云），
      港股/海外 API 更方便放在香港/海外节点，双节点架构如何协作；
      OpenClaw 的 cron / heartbeat / webhook 在本场景中的使用方式。

  - id: 7
    text: "合规 + 港股下单扩展（用户追加需求：港股要做实盘接入）"
    detail: >
      A 股为什么只能「提醒」不能「自动下单」？
        - 券商 API 合规现状（QMT/Ptrade 只对机构或高净值，散户拿不到）
        - 条件单 / 算法交易的合规边界
        - easytrader 类模拟键鼠的合法性 / 封号风险
      港股合法下单 API：Futu OpenAPI / Longbridge OpenAPI / Tiger OpenAPI 对比：
        - 开户门槛、API 申请流程、是否需要真实交易密码
        - 费率、实时行情订阅费、数据延迟
        - 支持的订单类型（市价/限价/条件单/止损）
        - Python SDK 质量、文档、社区案例
        - 从「提醒」升级到「一键执行」的推荐工作流（半自动：提醒 → 人工确认 → API 下单）
      产出：A 股红线清单 + 港股三大 API 对比表 + 半自动执行工作流推荐。

  - id: 8
    text: "端到端闭环：从自然语言偏好 → 上线提醒 的完整工作流模板"
    detail: >
      把前 7 个问题的结论串成一条落地 pipeline：
      Step 1 - 用户用自然语言描述偏好（例："港股低波动蓝筹 + 20 日均线
               回踩 + 成交量放大 2 倍 + 单票仓位不超过 10%"）
      Step 2 - Claude 把偏好翻译成具体的因子表达式 + 规则伪代码
               + 可调参数清单
      Step 3 - 用 Qlib / Backtrader 跑 5 年回测；Claude 协助解读报告
               （夏普/最大回撤/换手率）+ 参数敏感性分析
      Step 4 - 人工审核 + 样本外 / walk-forward 验证
      Step 5 - 策略代码封装成 OpenClaw skill；cron 定时跑；触发 → Telegram
      Step 6 - 港股可选升级：提醒 → 人工确认 → Futu/Longbridge API 下单
      Step 7 - 持续优化：每周让 Claude 看交易日志做复盘 + 策略微调
      产出：每一 Step 的 prompt 模板 + 代码 skeleton + 避坑清单。

scope_boundary: >
  ✅ 范围内：
    - 日频 / 波段（持仓 3 天 ~ 3 周）
    - A 股 + 港股双市场
    - 纯开源或低价方案（月开销 < ¥500 为宜，不算算力）
    - AI 介入策略构建（而非仅做数据展示）
    - OpenClaw / 自托管 agent 部署模式
    - 港股合法下单 API（用户追加）
  ❌ 范围外：
    - 日内 / 高频 / 做市 / tick 级
    - A 股自动下单（合规不通；只讨论红线）
    - 美股 / 加密货币 / 期货 / 期权 / 外汇
    - 机构级柜台（Ptrade / 恒生 / 顶点）
    - 券商开户 / 合规备案流程细节

existing_raw_sources: []

mode: "new"

notes: >
  - OpenClaw 本身不再深挖（已确认为自托管 agent + IM 皮肤 + skill/cron/webhook）；
    调研重点落在「在 OpenClaw 里跑什么」。
  - Q3 是核心；所有其他问题为 Q3 的落地支撑。
  - 用户明确偏好：波段 + 中级 + A/HK + 纯提醒（A 股）+ 港股下单扩展。
  - 全新项目，与现有 acoustic-portal-baking / indoor-space-segmentation 无重叠。
