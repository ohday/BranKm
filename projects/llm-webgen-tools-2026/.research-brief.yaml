mode: "new"

deliverable_shape: >
  最终 wiki 期望的结构：
    1. 全景地图（Mermaid：按用途/输出形态分类）
    2. 工具能力矩阵（横向对比表：视觉/动画/配色/导出/价格/国内可达）
    3. 决策树："我要 X → 用 Y"（按场景给推荐）
    4. Top 2-3 工具的 quickstart（实操路径，不是营销文案）
    5. 翻车清单（每个工具的边界 / 不擅长的场景）
    6. 国内可访问性专题（含支付方案 + 国产替代）
