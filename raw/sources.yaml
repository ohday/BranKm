      - https://raw.githubusercontent.com/ValveSoftware/steam-audio/master/core/src/core/probe_manager.h
      - https://raw.githubusercontent.com/ValveSoftware/steam-audio/master/core/src/core/deviation.h
      - https://raw.githubusercontent.com/ValveSoftware/steam-audio/master/core/src/core/deviation.cpp
