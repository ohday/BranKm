      - "Steam Audio evidence: explicit portals are NOT required - probe visibility graph encodes them implicitly"
      - "Morphological opening + CC: simplest, multi-scale sweep, O(N) per radius"
      - "SDF saddles via Hessian: gives position+normal, noise-sensitive"
      - "Persistence on SDF: principled significance ranking via persistent homology (Gudhi)"
      - "Min-cut: requires segmentation first - contradicts the pivot"
      - "Acoustic threshold is wavelength-dependent: gap<λ/4 diffracts fully, gap>4λ geometric"
      - "Useful acoustic portal range: 5cm-3m apertures for 125Hz-4kHz"
      - "Recommended: morphological portals ONLY for hybrid (dynamic closure, reverb regions)"
