  - id: 22
    title: "UTD and Deviation-Based Diffraction: Steam Audio vs Tsingos 2001"
    file: "utd-diffraction-steam-audio-vs-tsingos.md"
    fetched: 2026-04-21
    project: "acoustic-portal-baking"
    type: synthesis
    urls:
      - https://raw.githubusercontent.com/ValveSoftware/steam-audio/master/core/src/core/deviation.h
      - https://raw.githubusercontent.com/ValveSoftware/steam-audio/master/core/src/core/deviation.cpp
      - https://raw.githubusercontent.com/ValveSoftware/steam-audio/master/core/src/core/path_data.cpp
      - https://pixl.cs.princeton.edu/pubs/Tsingos_2001_MAI/index.php
      - https://europepmc.org/article/MED/15000186
      - https://www.mdpi.com/2073-8994/12/4/654/xml
      - https://www.researchgate.net/publication/2397824
    status: content-verified
    covers_questions: [7, 8, 9]
    key_claims:
      - "UTD formula: 4 cot terms with Fresnel transition function F(x)"
      - "|D| scales as 1/sqrt(f) => natural low-pass diffraction"
      - "Tsingos 2001: beam tracing over BSP enumerates diffracting edge sequences with real wedge params"
      - "Steam Audio: replace real wedge geometry with path-bend-angle + dummy (n=2, L=0.05m)"
      - "deviation = sum of turn angles at probe nodes along path"
      - "EQ normalized relative to straight-path reference: D(angle,band)/D(1e-8,band)"
      - "BTM is more accurate low-freq but 10x cost; Steam Audio avoids"
      - "Tsingos shadow-region approximation: only compute diffraction when direct path occluded"
