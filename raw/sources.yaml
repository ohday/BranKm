    status: content-verified
    covers_questions: [1, 5, 6, 7, 9, 10]
    key_claims:
      - "Steam Audio uses NO explicit portals - acoustic connectivity is encoded as a probe visibility graph"
      - "Probes placed via uniform floor grid (spacing=2m, height=1.5m), NOT adaptive/Poisson-disk"
      - "ProbeTree is a top-down median-split BVH over influence spheres (not k-d tree)"
      - "Visibility graph built by pairwise testing i>j pairs, then symmetrized"
      - "Baked pathing stores O(N^2) SoundPathRefs pointing into deduplicated unique-paths table"
      - "SoundPath only stores first/last/afterFirst/beforeLast probes + distance + deviation"
      - "Runtime: probeTree lookup + LOS test + path lookup + SH/EQ accumulation"
      - "Diffraction = path-bend-angle into UTD formula with dummy wedge (n=2, L=0.05m)"
      - "kMaxPaths=64, kMaxProbesPerBatch=8"
      - "Runtime cost <100us per source; storage ~5-20MB for 1000-probe scene"
